<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TiiPain vs SMGs</title>
    <meta
      name="description"
      content="TiiPain personal PUBG SMG tracker that auto-syncs from PUBG API data."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Chakra+Petch:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-noise" aria-hidden="true"></div>
    <main class="page-shell">
      <section class="hero card">
        <p class="eyebrow">Profile: TiiPain</p>
        <h1>TiiPain vs SMGs</h1>
        <p class="subtitle">
          Auto counter from PUBG API.
        </p>

        <div class="hero-grid">
          <div class="counter-wrap">
            <p class="counter-label">Total SMG deaths</p>
            <p id="deathCount" class="death-count" aria-live="polite">0</p>

            <div class="killer-feed-wrap">
              <p class="killer-feed-title">Everyone who killed me</p>
              <ul id="killerFeed" class="killer-feed-list"></ul>
            </div>
          </div>

          <div class="message-box">
            <h2>Message to Devs</h2>
            <p id="trollMessage" class="troll-message"></p>
          </div>
        </div>
      </section>

      <section class="hidden-sync" aria-hidden="true">
        <p id="apiStatus"></p>
        <p id="scanSummary"></p>
        <div id="killerResults"></div>
      </section>
    </main>

    <footer class="footer">
      <p>TiiPain SMG board.</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
